name: Rust CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --all

      - name: Test
        run: cargo test --all

      - name: Lint
        run: cargo clippy --all -- -D warnings